spring:
  application:
    name: server

  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL}
      chat:
        options:
          model: llama3:8B
          temperature: 0.3

  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true
    show-sql: true

  data:
    redis:
      lettuce:
        pool:
          max-active: 8
          enabled: true
          max-wait: 1ms
      port: '6379'
      host: ${SPRING_DATA_REDIS_URI:localhost}

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fashion_erp}
    driver-class-name: org.postgresql.Driver
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    hikari:
      connection-test-query: SELECT 1
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name:server}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99

springdoc:
  api-docs:
    enabled: ${API-DOCS:true}
  swagger-ui:
    enabled: ${SWAGGER-UI:true}

redis:
  time-to-live: ${REDIS_TTL:1800000}


jwt:
  access-token-public-key: classpath:certs/public.pem
  access-token-private-key: classpath:certs/private.pem
  access-token-expiration-duration: 15m
  refresh-token-expiration-duration: 7d


minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:adminpassword}

