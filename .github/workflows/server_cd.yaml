name: fashion-erp CD

on:
  push:
    branches: [ "dev/ilyass"]

jobs:
  test-runner:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Run the server
        run: |
          chmod +x ./server/deploy.sh
          ./server/deploy.sh
