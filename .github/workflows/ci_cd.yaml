name: fashion-erp CI/CD

on:
  push:
    branches: [ "main", "staging"]
    paths:
      - 'server/**'
  pull_request:
    types: [ opened, synchronize, reopened ]
    branches: [ "main", "staging"]
    paths:
      - 'server/**'

env:
  WORKING_DIR: ./server
  JAVA_VERSION: '17'

jobs:
  style-and-compile:
    name: Formatting & Style & Architecture (Fast Fail)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 
          
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven
          cache-dependency-path: server/pom.xml

      - name: Run Spotless Check
        run: mvn spotless:check
      
      - name: Test Compilation
        run: mvn test-compile
      
      - name: Run Architecture Tests (Fast Fail)
        run: mvn test -Dgroups="ArchitectureTests"

  tests:
    name: Integration & Unit Tests
    needs: style-and-compile
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      checks: write
    
    defaults:
      run:
        working-directory: ./server

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fashion_erp
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      minio:
        image: minio/minio
        ports:
          - "9000:9000"
          - "9001:9001"
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: adminpassword
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/live || exit 1"
          --health-interval 30s
          --health-timeout 10s
          --health-retries 10
          --health-start-period 30s
        command: server /data --console-address ":9001"

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17 with Caching
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        cache: 'maven'
        cache-dependency-path: server/pom.xml

    - name: Run Key Generation
      run: |
        chmod +x keygen.sh
        ./keygen.sh

    - name: Run Tests
      run: mvn test
      env:
        # Postgres Config
        SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/fashion_erp
        SPRING_DATASOURCE_USERNAME: postgres
        SPRING_DATASOURCE_PASSWORD: postgres

    - name: Enforce 60% Code Coverage
      run: mvn jacoco:check
  
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Deploy the server
        working-directory: ./server
        run: |
          chmod +x ./deploy.sh
          ./deploy.sh
