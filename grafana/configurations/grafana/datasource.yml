apiVersion: 1

deleteDatasources:
  - name: Prometheus
  - name: Loki
# --- PROMETHEUS ---
datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    url: http://prometheus:9090
    access: proxy
    isDefault: true
    editable: true
    jsonData:
      httpMethod: GET

  # --- LOKI ---
  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
    basicAuth: false
    version: 1
    editable: true