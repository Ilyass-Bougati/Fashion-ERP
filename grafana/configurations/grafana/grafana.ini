[server]
# domain = localhost

[security]
allow_sign_up = false
hide_version = true
admin_user = admin
admin_password = ${GF_SECURITY_ADMIN_PASSWORD}

[auth.anonymous]
enabled = false

[users]
default_theme = dark

[smtp]
enabled = true

host = smtp.example.com:587
user = ${GF_SMTP_USER}
password = ${GF_SMTP_PASSWORD}
from_address = ${GF_SMTP_USER}
from_name = Grafana Monitoring
skip_verify = false